<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ARサファリパーク</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: #2d5a27; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; color: white; }
    #container { position: relative; width: 100%; max-width: 640px; aspect-ratio: 4/3; margin-top: 20px; border: 5px solid #5d4037; border-radius: 15px; overflow: hidden; }
    video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    video { transform: scaleX(-1); visibility: hidden; }
    canvas { transform: scaleX(-1); }
    .controls { margin: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
    button { padding: 15px 25px; font-size: 18px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .btn-animal { background: #8bc34a; color: white; }
    .btn-animal:hover { background: #689f38; }
    .btn-snap { background: #ff5722; color: white; width: 100%; max-width: 200px; }
  </style>
</head>
<body>

  <div style="text-align:center; padding: 20px;">
    <h1 style="margin:0;">🦁 ARサファリ 🐰</h1>
    <p>顔を映して動物に変身！</p>
  </div>

  <div id="container">
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <div class="controls">
    <button class="btn-animal" onclick="setAnimal('🦁')">ライオン</button>
    <button class="btn-animal" onclick="setAnimal('🐰')">ウサギ</button>
    <button class="btn-animal" onclick="setAnimal('🐼')">パンダ</button>
    <button class="btn-animal" onclick="setAnimal('🐯')">トラ</button>
    <button class="btn-snap" onclick="takeSnapshot()">📷 写真を保存</button>
  </div>

<script>
  const videoElement = document.getElementById('input_video');
  const canvasElement = document.getElementById('output_canvas');
  const canvasCtx = canvasElement.getContext('2d');

  let currentIcon = '🦁';
  function setAnimal(icon) { currentIcon = icon; }

  function onResults(results) {
    canvasElement.width = results.image.width;
    canvasElement.height = results.image.height;
    
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
      for (const landmarks of results.multiFaceLandmarks) {
        const topHead = landmarks[10]; // おでこの上の方
        const nose = landmarks[5];    // 鼻
        
        const x = topHead.x * canvasElement.width;
        const y = topHead.y * canvasElement.height;
        
        // 顔の大きさに合わせて絵文字サイズを調整
        const faceSize = Math.abs(landmarks[234].x - landmarks[454].x) * canvasElement.width;
        
        canvasCtx.font = `${faceSize * 1.5}px serif`;
        canvasCtx.textAlign = "center";
        canvasCtx.textBaseline = "bottom";
        
        // 頭の上に表示
        canvasCtx.fillText(currentIcon, x, y);
      }
    }
    canvasCtx.restore();
  }

  const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
  faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
  faceMesh.onResults(onResults);

  const camera = new Camera(videoElement, {
    onFrame: async () => { await faceMesh.send({image: videoElement}); },
    width: 640, height: 480
  });
  camera.start();

  function takeSnapshot() {
    const link = document.createElement('a');
    link.download = `ar-photo.png`;
    link.href = canvasElement.toDataURL();
    link.click();
  }
</script>
</body>
</html>
